<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador Completo</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;margin:0;background:#0f2027;color:#fff}
.container{padding:20px}
.card{background:#1c1c1c;padding:20px;border-radius:12px;margin-bottom:20px}
input,select,button{width:100%;padding:10px;margin:5px 0;border:none;border-radius:6px}
button{background:#00c6ff;color:#000;font-weight:bold}
table{width:100%;border-collapse:collapse;font-size:11px}
th,td{border:1px solid #444;padding:5px;text-align:center}
th{background:#222}
</style>
</head>
<body>
<div class="container">

<div class="card">
<h2>Simulação Governo</h2>
<input id="renda" type="number" placeholder="Renda">
<input id="valor" type="number" placeholder="Valor imóvel">
<input id="entrada" type="number" placeholder="Entrada">
<input id="prazo" type="number" placeholder="Prazo (anos)">
<button onclick="simularGoverno()">Simular Governo</button>
<div id="resultadoGov"></div>
</div>

<div class="card">
<h2>Simulação Bancos</h2>
<select id="banco">
<option value="0.09">Caixa - 9%</option>
<option value="0.11">Itaú - 11%</option>
<option value="0.105">Bradesco - 10.5%</option>
</select>
<input id="valorB" type="number" placeholder="Valor imóvel">
<input id="entradaB" type="number" placeholder="Entrada">
<input id="prazoB" type="number" placeholder="Prazo (anos)">
<button onclick="simularBanco()">Simular Banco</button>
<div id="resultadoBanco"></div>
</div>

</div>

<script>
function formatar(v){return v.toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}

const faixas=[
{nome:'Faixa 1',juros:0.0425,subsidio:55000,max:2640},
{nome:'Faixa 2',juros:0.07,subsidio:30000,max:4400},
{nome:'Faixa 3',juros:0.0816,subsidio:0,max:8000},
{nome:'Faixa 4',juros:0.095,subsidio:0,max:14000}
];

function identificarFaixa(r){return faixas.find(f=>r<=f.max)||faixas[3]}

function gerarTabela(valor, taxa, meses){
let taxaMes = taxa/12;
let base = valor/meses;
let tabela = [];
let hoje = new Date();

for(let i=1;i<=5;i++){ // FIXADO EM 5 PARCELAS
 let jurosMes = valor * taxaMes;
 let jurosAno = valor * taxa;
 let parcelaFinal = base + jurosMes;

 let data = new Date(hoje);
 data.setMonth(data.getMonth() + i);

 tabela.push({
  numero:i,
  data:data.toLocaleDateString('pt-BR'),
  base, taxaMes, taxaAno:taxa,
  jurosMes, jurosAno, parcelaFinal
 });
}
return tabela;
}

function montarTabela(tabela){
let html=`<table>
<tr>
<th>Faixa</th><th>Parcela</th><th>Data</th><th>Base</th><th>% Mês</th><th>% Ano</th>
<th>Juros Mês</th><th>Juros Ano</th><th>Parcela Final</th>
</tr>`;

tabela.forEach(t=>{
 html+=`<tr>
 <td>${t.faixa || ''}</td><td>Parcela ${t.numero}</td>
 <td>${t.data}</td>
 <td>${formatar(t.base)}</td>
 <td>${(t.taxaMes*100).toFixed(2)}%</td>
 <td>${(t.taxaAno*100).toFixed(2)}%</td>
 <td>${formatar(t.jurosMes)}</td>
 <td>${formatar(t.jurosAno)}</td>
 <td>${formatar(t.parcelaFinal)}</td>
 </tr>`;
});

html+="</table>";
return html;
}

function simularGoverno(){
let renda=parseFloat(document.getElementById('renda').value);
let valor=parseFloat(document.getElementById('valor').value);
let entrada=parseFloat(document.getElementById('entrada').value);
let prazo=parseInt(document.getElementById('prazo').value)*12;

let faixa=identificarFaixa(renda);
let financiado=valor-entrada-faixa.subsidio;

let tabela=gerarTabela(financiado,faixa.juros,prazo);

// adiciona faixa em cada linha
tabela = tabela.map(t => ({...t, faixa: faixa.nome}));

resultadoGov.innerHTML=montarTabela(tabela);
}

function simularBanco(){
let taxa=parseFloat(document.getElementById('banco').value);
let valor=parseFloat(document.getElementById('valorB').value);
let entrada=parseFloat(document.getElementById('entradaB').value);
let prazo=parseInt(document.getElementById('prazoB').value)*12;

let financiado=valor-entrada;

let tabela=gerarTabela(financiado,taxa,prazo);

resultadoBanco.innerHTML=montarTabela(tabela);
}

</script>

</body>
</html>
